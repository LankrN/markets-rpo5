{% extends 'base.html' %}
{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card border-danger shadow">
                <div class="card-header bg-danger text-white">
                    <h4 class="mb-0">Подтверждение удаления</h4>
                </div>
                <div class="card-body text-center">
                    <p class="lead">Вы действительно хотите удалить объявление:</p>
                    <h3 class="text-primary">"{{ ad.title }}"?</h3>
                    <p class="text-muted small">Это действие нельзя будет отменить.</p>
                    <form method="POST" class="mt-4">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger px-4">Да, удалить навсегда</button>
                        <a href="{% url 'ad_detail' ad.pk %}" class="btn btn-secondary px-4">Отмена</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
