{% extends 'base.html' %}
{% block title %}Вход - Ad-Project{% endblock %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="text-center mb-4">Авторизация</h3>
                {% if form.errors %}
                    <div class="alert alert-danger">
                        Неверный логин или пароль. Попробуйте еще раз.
                    </div>
                {% endif %}
                <form method="POST">
                    {% csrf_token %} <div class="mb-3">
                        <label class="form-label">Логин</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Пароль</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
                <div class="text-center mt-3">
                    <small>Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
